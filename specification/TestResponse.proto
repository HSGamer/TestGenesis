// TestResponse.proto — Modular test response envelope for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

import "google/protobuf/timestamp.proto";
import "TestStatus.proto";
import "Telemetry.proto";
import "TestResult.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TestResponse is a polymorphic message streamed from the Agent during test execution.
message TestResponse {
  // When this response event was sent.
  google.protobuf.Timestamp timestamp = 1;

  // The specific execution events.
  oneof event {
    // Current status update from the Agent.
    TestStatus status = 2;

    // Real-time telemetry log entry.
    Telemetry telemetry = 3;

    // The final result of the test execution.
    TestResult result = 4;
  }
}
