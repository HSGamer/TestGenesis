// translation.proto — Script translation messages for the Universal Agent Protocol (UAP).
//
// This file defines all messages involved in a single script translation session.
// A translation session converts a test script from one format to another
// (e.g., Selenium IDE .side → Playwright JavaScript).
//
// Like job sessions, each translation is a dedicated bi-directional stream,
// fully isolated from the control plane and other sessions.
//
// Lifecycle: TranslationInit → TranslationStatus(ACKNOWLEDGED) →
//            TranslationStatus(PROCESSING) → Telemetry... →
//            TranslationStatus(COMPLETED|FAILED) → TranslationResult → stream closes.

syntax = "proto3";

package uap.v1;

import "google/protobuf/timestamp.proto";
import "common.proto";

// TranslationInit is the initial request sent by the Hub to start a
// translation session. The source format is inferred from the payload's
// type field, so only the target format needs to be specified explicitly.
message TranslationInit {
  // The desired output format for the translated script.
  // Must match a TranslationCapability.to_type declared by this Agent.
  // Examples: "playwright-js", "python-pytest", "cypress".
  string target_format = 1;

  // The source script to translate.
  // The Payload.type field identifies the source format (e.g., "selenium-side").
  uap.v1.Payload payload = 2;
}

// TranslationCommand is a message sent by the Hub to the Agent during
// an active translation session to control the process or provide feedback.
//
// The Agent MUST implement the 'help' and 'stop' commands.
message TranslationCommand {
  oneof command {
    // Request a list of all available commands. The Agent must respond
    // with a Telemetry message containing command descriptions.
    uap.v1.HelpCommand help = 1;

    // Forcefully stop the translation. The Agent must send a terminal
    // FAILED status and a partial TranslationResult before closing.
    uap.v1.StopCommand stop = 2;

    // An Agent-specific custom command (e.g., "skip-unsupported", "verbose").
    // Useful for providing interactive feedback during ambiguous conversions.
    string custom = 3;
  }
}

// TranslationResponse is a polymorphic message streamed from the Agent to
// the Hub during a translation session. Each message carries exactly one of:
// a status update, a telemetry log entry, or the final result.
message TranslationResponse {
  // When this message was generated by the Agent.
  google.protobuf.Timestamp timestamp = 1;

  // The content of this response. Exactly one must be set.
  oneof response {
    // A lifecycle status update (e.g., ACKNOWLEDGED, PROCESSING, COMPLETED).
    TranslationStatus status = 2;

    // A real-time log entry (e.g., conversion progress, warnings).
    uap.v1.Telemetry telemetry = 3;

    // The final translation output. Sent once, just before the stream closes.
    TranslationResult result = 4;
  }
}

// TranslationStatus represents the current state of a translation session.
// Status transitions follow the state machine defined in PROTOCOL.md.
message TranslationStatus {
  enum State {
    // Default value. Should not be used in practice.
    UNKNOWN = 0;

    // The Agent has received and accepted the translation request.
    ACKNOWLEDGED = 1;

    // The source payload or target format is unsupported. Terminal state — stream closes.
    INVALID = 2;

    // The Agent is actively converting the script.
    PROCESSING = 3;

    // The Agent has encountered an ambiguity and is waiting for the Hub
    // to provide clarification via a custom TranslationCommand.
    // Examples: unsupported command mapping, ambiguous selector strategy.
    WAITING_FOR_FEEDBACK = 4;

    // The translation completed successfully. Terminal state.
    COMPLETED = 5;

    // The translation failed or was stopped. Terminal state.
    FAILED = 6;
  }

  // The current state of the translation.
  State state = 1;

  // An optional human-readable message providing context for this state.
  // Examples: "Converting 15 test cases", "Unsupported command: waitForPopUp",
  //           "Stopped by Hub command".
  string message = 2;
}

// TranslationResult is the final output sent by the Agent when a
// translation session ends. It is the last meaningful message before
// the stream closes.
message TranslationResult {
  // The terminal status of the translation (COMPLETED or FAILED).
  TranslationStatus status = 1;

  // The translated script in the target format.
  // The Payload.type field will reflect the target_format from TranslationInit.
  // May be empty or partial if the translation failed.
  uap.v1.Payload translated_payload = 2;

  // A human-readable log of the conversion process, including any
  // warnings, skipped elements, or mapping decisions made by the Agent.
  string translation_log = 3;
}
