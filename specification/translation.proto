// translation.proto — Script translation messages for the Universal Agent Protocol (UAP).
//
// This file defines all messages involved in a single translation session.
// A translation session is a dedicated bi-directional stream between the
// Agent and the Hub, isolated from other sessions and the control plane.

syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "common.proto";

// Service for dispatching and executing script translations.
service TranslationHub {
  // Listen establishes a long-lived server-streaming connection where the
  // Agent waits for script translation assignments from the Hub.
  rpc Listen(TranslationListenRequest) returns (stream TranslationListenResponse);

  // Translate opens a dedicated bi-directional stream for a script translation.
  rpc Translate(stream TranslateMessage) returns (stream TranslationInstruction);
}

// ─── Control Plane: Translation ─────────────────────────────────

// TranslationListenRequest is sent once by the Agent when it connects to the TranslationHub.
message TranslationListenRequest {
  // A human-readable name for this Agent.
  string display_name = 1;

  // The list of translation capabilities this Agent supports.
  repeated uap.v1.TranslationCapability capabilities = 2;
}

// TranslationListenResponse is streamed from the Hub over the TranslationHub.Listen.
message TranslationListenResponse {
  oneof content {
    // The Hub's registration response. Sent as the first message.
    RegistrationResponse registration = 1;

    // Instructs the Agent to start a script translation.
    TranslationAssignment start_translation = 2;

    // A connectivity check.
    google.protobuf.Empty heartbeat_request = 3;
  }
}

// TranslationAssignment directs the Agent to open a new Translate session.
message TranslationAssignment {
  string session_id = 1;
}

// TranslationCapability declares that the Agent can convert scripts
// from one format to another.
message TranslationCapability {
  // The source format this Agent can read from.
  string from_type = 1;

  // The target format this Agent can produce.
  string to_type = 2;
}

// ─── Execution Plane: Translation ───────────────────────────────

// TranslateMessage is the Agent-to-Hub message type for the Translate stream.
message TranslateMessage {
  oneof content {
    string session_id = 1;
    TranslationResponse update = 2;
  }
}

// TranslationInstruction is the Hub-to-Agent message type for the Translate stream.
message TranslationInstruction {
  oneof content {
    uap.v1.TranslationInit translation_init = 1;
    uap.v1.TranslationCommand command = 2;
  }
}

// ─── Core Message Components: Translation ───────────────────────

// TranslationInit is the initial configuration sent by the Hub to start a translation.
message TranslationInit {
  string target_format = 1;
  uap.v1.Payload payload = 2;
}

// TranslationCommand is a message sent by the Hub during an active translation session.
message TranslationCommand {
  oneof command {
    uap.v1.HelpCommand help = 1;
    uap.v1.StopCommand stop = 2;
    string custom = 3;
  }
}

// TranslationResponse is a polymorphic message streamed from the Agent during translation.
message TranslationResponse {
  google.protobuf.Timestamp timestamp = 1;
  oneof response {
    TranslationStatus status = 2;
    uap.v1.Telemetry telemetry = 3;
    TranslationResult result = 4;
  }
}

// TranslationStatus represents the state of a translation session.
message TranslationStatus {
  enum State {
    UNKNOWN = 0;
    ACKNOWLEDGED = 1;
    INVALID = 2;
    PROCESSING = 3;
    COMPLETED = 4;
    FAILED = 5;
  }
  State state = 1;
  string message = 2;
}

// TranslationResult is the final outcome of a script translation session.
message TranslationResult {
  TranslationStatus status = 1;
  uap.v1.Payload translated_payload = 2;
  string translation_log = 3;
}
