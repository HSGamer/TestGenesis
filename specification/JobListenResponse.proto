// JobListenResponse.proto — Control plane response envelope for the Universal Agent Protocol (UAP) test jobs.
syntax = "proto3";

package uap.v1;

import "JobAssignment.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// JobListenResponse is the Hub-to-Agent message type for the Listen stream.
message JobListenResponse {
  // The specific control plane events.
  oneof event {
    // Instructs the Agent to start a test job.
    JobAssignment run_job = 1;
  }
}
