// TranslationCommand.proto — Control plane commands for the Universal Agent Protocol (UAP) translation.
syntax = "proto3";

package uap.v1;

import "HelpCommand.proto";
import "StopCommand.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TranslationCommand is a message sent by the Hub during an active translation session.
message TranslationCommand {
  // The specific command content.
  oneof command {
    // Built-in help signal.
    HelpCommand help = 1;

    // Built-in termination signal.
    StopCommand stop = 2;

    // Custom, engine-specific command string.
    string custom = 3;
  }
}
