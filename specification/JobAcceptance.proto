// JobAcceptance.proto — Agent response to a job proposal for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// JobAcceptance is sent by the Agent to the Hub to confirm or reject a job proposal.
message JobAcceptance {
  // The unique session ID for the proposed job.
  string session_id = 1;

  // Whether the job is accepted or not.
  bool accepted = 2;

  // Optional reason for rejection.
  string reason = 3;
}
