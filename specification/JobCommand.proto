// JobCommand.proto — Control plane commands for the Universal Agent Protocol (UAP) test jobs.
syntax = "proto3";

package uap.v1;

import "HelpCommand.proto";
import "StopCommand.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// JobCommand is a message sent by the Hub to the Agent during an active
// test job session to control or query the session's state.
message JobCommand {
  // The specific command content.
  oneof command {
    // Built-in help signal.
    HelpCommand help = 1;

    // Built-in termination signal.
    StopCommand stop = 2;

    // Custom, engine-specific command string.
    string custom = 3;
  }
}
