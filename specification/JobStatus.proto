// JobStatus.proto — Status reporting for the Universal Agent Protocol (UAP) test jobs.
syntax = "proto3";

package uap.v1;

import "JobState.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// JobStatus represents the current execution state of a test job.
message JobStatus {
  // The normalized state of the job.
  JobState state = 1;

  // Optional human-readable message providing additional context.
  string message = 2;
}
