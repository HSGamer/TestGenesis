// TranslationResult.proto — Final translation outcome for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

import "TranslationStatus.proto";
import "Payload.proto";
import "Summary.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TranslationResult is the final outcome of an execution session.
message TranslationResult {
  // Final status of the translation process.
  TranslationStatus status = 1;

  // The list of translated scripts / projects.
  repeated Payload payloads = 2;

  // Summary information for the entire session.
  Summary summary = 3;
}
