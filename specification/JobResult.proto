// JobResult.proto — Final job outcome for the Universal Agent Protocol (UAP) test jobs.
syntax = "proto3";

package uap.v1;

import "JobStatus.proto";
import "StepReport.proto";
import "Summary.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// JobResult is the final outcome of an execution session.
message JobResult {
  // Final status of the job execution.
  JobStatus status = 1;

  // Detailed step-by-step reporting for the job.
  repeated StepReport reports = 2;

  // Summary information for the entire session.
  Summary summary = 3;
}
