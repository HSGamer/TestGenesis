// TranslationAssignment.proto — Assignment message for the Universal Agent Protocol (UAP) translation.
syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TranslationAssignment directs the Agent to open a new Translate session.
message TranslationAssignment {
  // A unique session ID for the translation session.
  string session_id = 1;
}
