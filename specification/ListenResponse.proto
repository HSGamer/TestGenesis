// ListenResponse.proto — Unified control plane response for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

import "SessionProposal.proto";
import "SessionReady.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// ListenResponse is the Hub-to-Agent envelope for the unified control stream.
message ListenResponse {
  // Multiplexed control plane events.
  oneof event {
    // Initial request sent by Hub to ask the agent if they can accept the session workload.
    SessionProposal session_proposal = 1;

    // Sync signal stating the backend successfully registered the session
    SessionReady session_ready = 2;
  }
}
