// TestInstruction.proto — Modular test instruction envelope for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

import "TestRequest.proto";
import "TestCommand.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TestInstruction is the Hub-to-Agent message type for the Execute stream.
message TestInstruction {
  // The specific instruction event.
  oneof event {
    // The initial test configuration.
    TestRequest test_init = 1;

    // An interactive command sent during test execution.
    TestCommand command = 2;
  }
}
