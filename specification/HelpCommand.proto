// HelpCommand.proto — Standardized help signal for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// HelpCommand is a built-in command that an Agent can support.
// It signals to the Hub that the Hub should send back help text
// or listing all available commands and their descriptions.
message HelpCommand {}
