// AgentRegistration.proto — Universal registration for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

import "Capability.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// AgentRegistration identifies an Agent and lists all its heterogeneous capabilities.
message AgentRegistration {
  // A human-readable name for this Agent.
  string display_name = 1;

  // The list of all formats (Test or Translation) this Agent can process.
  repeated Capability capabilities = 2;
}
