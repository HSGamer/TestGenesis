// JobHub.proto — Service definition for the Universal Agent Protocol (UAP) test jobs.
syntax = "proto3";

package uap.v1;

import "JobInstruction.proto";
import "JobResponse.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// Service for dispatching and executing test jobs.
service JobHub {
  // Execute opens a dedicated bi-directional stream for a test job execution session.
  // Highly isolated and multi-plexed via instructions and response events.
  rpc Execute(stream JobResponse) returns (stream JobInstruction);
}
