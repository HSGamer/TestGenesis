// common.proto — Shared message types for the Universal Agent Protocol (UAP).
//
// This file defines the foundational data structures reused across
// job execution, script translation, and telemetry reporting.

syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

// Payload represents a polymorphic test artifact or script.
// It can carry either raw binary data (e.g., a Python script file)
// or structured data (e.g., a Selenium IDE .side project as JSON).
//
// The 'type' field acts as a format identifier that Agents use to
// determine whether they can process this payload. It must match
// one of the Agent's declared TestCapability.test_type values.
message Payload {
  // A format identifier for the content (e.g., "side", "python", "playwright-js").
  string type = 1;

  // The actual content of the payload. Exactly one must be set.
  oneof content {
    // Raw binary content (e.g., a script file, a ZIP archive).
    bytes raw_data = 2;

    // Structured content represented as a JSON-like key-value map.
    // Useful for test definitions that are natively structured (e.g., Selenium .side format).
    google.protobuf.Struct structured_data = 3;
  }
}

// Telemetry represents a single real-time log entry streamed from
// the Agent to the Hub during job execution or translation.
//
// At its simplest, it is a plain text log line. The optional 'extra'
// field allows attaching rich data such as screenshots, performance
// metrics, or structured error details.
message Telemetry {
  // The primary human-readable log message.
  string message = 1;

  // Optional rich attachment. At most one may be set.
  oneof extra {
    // Structured metadata (e.g., performance counters, error context).
    google.protobuf.Struct metadata = 2;

    // Raw binary data (e.g., a PNG screenshot, a HAR file).
    bytes blob = 3;
  }

  // Identifies the type of the 'extra' content.
  string extra_type = 4;

  // The timestamp of the telemetry event.
  google.protobuf.Timestamp timestamp = 5;

  // Severity levels for telemetry.
  enum Severity {
    SEVERITY_UNSPECIFIED = 0;
    TRACE = 1;
    DEBUG = 2;
    INFO = 3;
    WARN = 4;
    ERROR = 5;
    FATAL = 6;
  }

  // The severity level of this telemetry entry.
  Severity level = 6;

  // The source of this telemetry (e.g., "stdout", "stderr", "selenium-engine", "browser-console").
  string source = 7;
}

// Attachment represents a generic binary or structured file attached to a report.
message Attachment {
  // A name for the attachment (e.g., "screenshot.png", "execution.log").
  string name = 1;

  // The MIME type of the content (e.g., "image/png", "text/plain", "video/webm").
  string mime_type = 2;

  // The actual binary content of the attachment.
  bytes data = 3;

  // Metadata associated with the attachment.
  google.protobuf.Struct metadata = 4;

  // The time the attachment was captured.
  google.protobuf.Timestamp timestamp = 5;
}

// HelpCommand is a built-in command that every Agent MUST support.
// When received, the Agent must respond with a Telemetry message
// listing all available commands and their descriptions.
message HelpCommand {}

// StopCommand is a built-in command that every Agent MUST support.
// When received, the Agent must gracefully terminate the current
// session, send a terminal status with a partial result, and close the stream.
message StopCommand {}

// Summary provides a standardized overview of a test or translation session.
message Summary {
  // The total execution time of the session.
  google.protobuf.Duration total_duration = 1;

  // When the session execution actually started.
  google.protobuf.Timestamp start_time = 2;

  // Flexible metadata store for engine-specific details (e.g., browser metrics).
  google.protobuf.Struct metadata = 3;
}

