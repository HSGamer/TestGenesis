// JobState.proto — Standard execution states for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// JobState represents the state of a test job session.
enum JobState {
  JOB_STATE_UNSPECIFIED = 0;
  JOB_STATE_ACKNOWLEDGED = 1;
  JOB_STATE_INVALID = 2;
  JOB_STATE_RUNNING = 3;
  JOB_STATE_COMPLETED = 4;
  JOB_STATE_FAILED = 5;
}
