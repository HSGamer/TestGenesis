// TranslationState.proto — Standard translation states for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TranslationState represents the state of a script translation session.
enum TranslationState {
  TRANSLATION_STATE_UNSPECIFIED = 0;
  TRANSLATION_STATE_ACKNOWLEDGED = 1;
  TRANSLATION_STATE_INVALID = 2;
  TRANSLATION_STATE_PROCESSING = 3;
  TRANSLATION_STATE_COMPLETED = 4;
  TRANSLATION_STATE_FAILED = 5;
}
