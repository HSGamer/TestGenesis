// Attachment.proto — Shared attachment type for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// Attachment represents a generic binary or structured file attached to a report.
message Attachment {
  string name = 1;
  string mime_type = 2;
  bytes data = 3;
}
