// TranslationRegistration.proto — Control plane registration messages for the Universal Agent Protocol (UAP) translation.
syntax = "proto3";

package uap.v1;

import "TranslationCapability.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TranslationRegistration is the message sent by an Agent to the Hub to 
// declare its presence and its capabilities for script translation.
message TranslationRegistration {
  // A human-readable identifier for the Agent.
  string display_name = 1;

  // Key-value metadata for the Agent (e.g., OS version, IP address).
  map<string, string> metadata = 2;

  // The list of formats this Agent is capable of translating.
  repeated TranslationCapability capabilities = 3; // (Imported from TranslationCapability.proto)
}
