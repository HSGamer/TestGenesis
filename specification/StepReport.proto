// StepReport.proto — Standardized step-level reporting for the Universal Agent Protocol (UAP) jobs.
syntax = "proto3";

package uap.v1;

import "Summary.proto";
import "Attachment.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// StepReport represents the outcome of a single test step.
message StepReport {
  // A name for the test step.
  string name = 1;

  // The final status of this specific step.
  string status = 2;

  // Key-value metadata about the step execution.
  map<string, string> metadata = 3;

  // Rich data captured during the step (e.g., screenshots).
  repeated Attachment attachments = 4;

  // Detailed summary of the step execution.
  Summary summary = 5;
}
