// job.proto — Test job execution messages for the Universal Agent Protocol (UAP).
//
// This file defines all messages involved in a single test execution session.
// A job session is a dedicated bi-directional stream between the Agent and
// the Hub, isolated from other sessions and the control plane.

syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "common.proto";

// Service for dispatching and executing test jobs.
service JobHub {
  // Listen establishes a long-lived bi-directional streaming connection where the
  // Agent waits for job assignments and signals its readiness.
  rpc Listen(stream JobListenRequest) returns (stream JobListenResponse);

  // Execute opens a dedicated bi-directional stream for a test job execution.
  rpc Execute(stream JobResponse) returns (stream JobInstruction);
}

// ─── Control Plane: Job ─────────────────────────────────────────

// JobListenRequest is streamed from the Agent to the Hub over the JobHub.Listen.
message JobListenRequest {
  oneof content {
    // Initial registration packet sent once by the Agent upon connection.
    JobRegistration registration = 1;

    // Heartbeat and pull signal. Indicates the Agent is idle and ready for a job.
    google.protobuf.Empty ready = 2;
  }
}

// JobRegistration contains the identity and capabilities of the Agent.
message JobRegistration {
  // A human-readable name for this Agent.
  string display_name = 1;

  // The list of test formats this Agent can execute.
  repeated uap.v1.TestCapability capabilities = 2;
}

// JobListenResponse is streamed from the Hub to the Agent over the JobHub.Listen.
message JobListenResponse {
  oneof content {
    // Instructs the Agent to start a test job.
    JobAssignment run_job = 1;
  }
}

// JobAssignment directs the Agent to open a new Execute session on JobHub.
message JobAssignment {
  string session_id = 1;
}

// TestCapability declares that the Agent can execute test payloads
// of a specific format.
message TestCapability {
  // The test format identifier that this Agent supports.
  // Must match the Payload.type field in job requests.
  // Examples: "selenium-side", "playwright-js", "cypress", "python-pytest".
  string test_type = 1;
}

// ─── Execution Plane: Job ───────────────────────────────────────


// JobInstruction is the Hub-to-Agent message type for the Execute stream.
message JobInstruction {
  oneof content {
    // The initial job configuration.
    uap.v1.JobRequest job_init = 1;

    // An interactive command sent during job execution.
    uap.v1.JobCommand command = 2;
  }
}

// ─── Core Message Components: Job ───────────────────────────────

// JobRequest is the initial configuration sent by the Hub to start a test job.
message JobRequest {
  google.protobuf.Struct runtime_env = 1;
  uap.v1.Payload payload = 2;
}

// JobCommand is a message sent by the Hub to the Agent during an active
// job session to control or interact with the running test.
message JobCommand {
  oneof command {
    uap.v1.HelpCommand help = 1;
    uap.v1.StopCommand stop = 2;
    string custom = 3;
  }
}

// JobResponse is a polymorphic message streamed from the Agent to the Hub.
message JobResponse {
  google.protobuf.Timestamp timestamp = 1;
  oneof response {
    JobStatus status = 2;
    uap.v1.Telemetry telemetry = 3;
    JobResult result = 4;
  }
}

// JobStatus represents the current state of a job session.
message JobStatus {
  enum State {
    UNKNOWN = 0;
    ACKNOWLEDGED = 1;
    INVALID = 2;
    EXECUTING = 3;
    PAUSED = 4;
    COMPLETED = 5;
    FAILED = 6;
  }
  State state = 1;
  string message = 2;
}

// JobResult is the final summary sent by the Agent when a job session ends.
message JobResult {
  JobStatus status = 1;
  repeated StepReport steps = 2;
  repeated string logs = 3;
  google.protobuf.Struct summary = 4;
}

// StepReport describes the outcome of a single test step or command.
message StepReport {
  string name = 1;
  JobStatus status = 2;
}
