// JobAssignment.proto — Standard assignment message for the Universal Agent Protocol (UAP) test jobs.
syntax = "proto3";

package uap.v1;

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// JobAssignment directs the Agent to open a new Execute session.
message JobAssignment {
  // A unique session ID for the job execution.
  string session_id = 1;
}
