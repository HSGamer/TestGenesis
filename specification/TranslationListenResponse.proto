// TranslationListenResponse.proto — Control plane response envelope for the Universal Agent Protocol (UAP) translation.
syntax = "proto3";

package uap.v1;

import "TranslationAssignment.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// TranslationListenResponse is the Hub-to-Agent message type for the Listen stream.
message TranslationListenResponse {
  // The specific control plane events.
  oneof event {
    // Instructs the Agent to start a translation session.
    TranslationAssignment run_translation = 1;
  }
}
