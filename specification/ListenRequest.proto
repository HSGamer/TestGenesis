// ListenRequest.proto — Unified control plane request for the Universal Agent Protocol (UAP).
syntax = "proto3";

package uap.v1;

import "google/protobuf/empty.proto";
import "JobAcceptance.proto";
import "TranslationAcceptance.proto";

option java_package = "me.hsgamer.testgenesis.uap.v1";
option java_multiple_files = true;

// ListenRequest is the Agent-to-Hub envelope for the unified control stream.
message ListenRequest {
  // Multiplexed control plane events.
  oneof event {
    // Response to a job proposal.
    JobAcceptance job_acceptance = 1;

    // Response to a translation proposal.
    TranslationAcceptance translation_acceptance = 2;
  }
}
