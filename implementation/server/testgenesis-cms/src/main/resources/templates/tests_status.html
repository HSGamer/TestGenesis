{#include base.html}
{#title}Execution Status{/title}

{#body}
<section>
    <h2>Test Status</h2>
    <p><code>{session.sessionId}</code></p>
    <nav class="actions">
        <strong id="status-badge" class="status-badge status-state-pending">PENDING</strong>
        <a href="/tests/{session.sessionId}/report/json" class="btn" download title="Minimal report (no attachments)">JSON</a>
        <a href="/tests/{session.sessionId}/report/json?full=true" class="btn" download title="Full report with attachments">Full JSON</a>
        <a href="/tests" class="btn">Back</a>
    </nav>
</section>

<section>
    <h3>Progress</h3>
    <div id="steps-container">
        <p id="status-message" class="text-muted">Waiting for agent...</p>
    </div>
</section>

<section id="summary-section" class="d-none">
    <h3>Summary</h3>
    <p>Total Duration: <strong id="summary-duration"></strong></p>
    <pre id="summary-json"></pre>
</section>

<template id="step-template">
    <article style="border: 1px solid var(--border-color); padding: 0.75rem; margin-bottom: 0.5rem; border-radius: var(--radius);">
        <nav class="flex-between step-header" style="cursor:pointer;">
            <strong>
                <span class="status-badge"></span>
                <span class="step-name"></span>
            </strong>
            <code class="duration"></code>
        </nav>
        <section class="details d-none" style="margin-top: 0.5rem; border-top: 1px solid var(--border-color); padding-top: 0.5rem;">
            <pre class="metadata"></pre>
        </section>
    </article>
</template>

<template id="attachment-template">
    <figure>
        <img class="attachment-img d-none">
        <figcaption class="attachment-name"></figcaption>
        <a class="download-link btn small" target="_blank">Download</a>
    </figure>
</template>

<section id="attachments-section" class="d-none">
    <h3>Attachments</h3>
    <div id="attachments-container" class="attachment-grid"></div>
</section>

<section>
    <h3>Console</h3>
    <div id="telemetry-console"></div>
</section>

<script>
    window.sessionId = "{session.sessionId}";
</script>
<script src="/js/tests_status.js"></script>
{/body}
{/include}
