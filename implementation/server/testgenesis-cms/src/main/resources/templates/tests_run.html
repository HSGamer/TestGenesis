{#include base.html}
{#title}Run Test - {test.name}{/title}

{#body}
<div class="flex-between" style="margin-bottom: 2rem;">
    <div>
        <h2>Launch Test</h2>
        <div class="text-muted small">Target: <strong>{test.name}</strong> <code>({test.testType})</code></div>
    </div>
    <a href="/tests" class="btn">Back</a>
</div>

<form action="/tests/{test.id}/start" method="POST">
    <section>
        <h3>Agents</h3>
        <div class="list">
            {#for agent in agents}
                {#if agent.supportsTestType(test.testType)}
                    <label class="list-item flex" style="cursor: pointer;">
                        <input type="radio" name="agentId" value="{agent.id}" required style="width: auto;">
                        <div style="flex: 1;">
                            <div class="flex-between">
                                <span class="small"><strong>{agent.displayName}</strong></span>
                                <span class="status-badge status-passed">Online</span>
                            </div>
                            <code class="text-muted small">{agent.id}</code>
                        </div>
                    </label>
                {/if}
            {#else}
                <div class="list-item text-muted small">No agents available for <strong>{test.testType}</strong>.</div>
            {/for}
        </div>
    </section>

    <div style="margin-top: 2rem;">
        <button type="submit" class="btn btn-primary">Launch Execution</button>
    </div>
</form>
{/body}
{/include}
