{#include base.html}
{#title}Payloads{/title}

{#body}
<section>
    <h2>Payloads</h2>
    <nav class="actions">
        <a href="/payloads/new" class="btn btn-primary">New Payload</a>
    </nav>
</section>

<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>File</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {#for payload in payloads}
        <tr>
            <td><strong>{payload.name}</strong></td>
            <td><code>{payload.type}</code></td>
            <td>
                {#if payload.attachmentName}
                    <a href="/payloads/{payload.id}/attachment">{payload.attachmentName}</a>
                {#else}
                    <small class="text-muted">No file</small>
                {/if}
            </td>
            <td>
                <nav class="actions">
                    <a href="/payloads/{payload.id}/edit" class="btn">Edit</a>
                    <form action="/payloads/{payload.id}/delete" method="POST" onsubmit="return confirm('Are you sure?');" style="display: inline;">
                        <button type="submit" class="status-failed">Del</button>
                    </form>
                </nav>
            </td>
        </tr>
        {#else}
        <tr>
            <td colspan="4"><p class="text-muted">No payloads found.</p></td>
        </tr>
        {/for}
    </tbody>
</table>
{/body}
{/include}
