{#include base.html}
{#title}{#if test.id}Edit {test.name}{#else}New Test{/if}{/title}

{#body}
<div class="flex-between" style="margin-bottom: 2rem;">
    <h2>{#if test.id}Edit Test{#else}New Test{/if}</h2>
    <a href="/tests" class="btn">Cancel</a>
</div>

<form action="/tests/save" method="POST">
    {#if test.id}
        <input type="hidden" name="id" value="{test.id}">
    {/if}

    <div class="card">
        <label>Name</label>
        <input type="text" name="name" value="{test.name}" required>
    </div>

    <div class="card">
        <label>Description</label>
        <textarea name="description" rows="3">{test.description}</textarea>
    </div>

    <div class="card">
        <label>Protocol Test Type</label>
        <input type="text" id="test-type-input" name="testType" value="{test.testType}" required list="test-type-suggestions">
        <datalist id="test-type-suggestions"></datalist>
    </div>

    <div class="card">
        <label>Reference Agent (Guidance)</label>
        <select id="agent-selector">
            <option value="">-- No Agent Selected --</option>
        </select>
        <div class="text-muted small" style="margin-top: 0.5rem;">Select an agent to see recommendations.</div>
    </div>

    <section>
        <h3>Payloads</h3>
        <div id="payload-selector" class="list" style="max-height: 400px; overflow-y: auto;">
            {#for p in allPayloads}
                <label class="list-item flex" data-type="{p.type}" style="cursor: pointer;">
                    <input type="checkbox" name="payloadIds" value="{p.id}" style="width: auto;" {#if test.payloads.contains(p)}checked{/if}>
                    <span class="small">
                        <strong>{p.name}</strong> 
                        <code class="text-muted">({p.type})</code>
                    </span>
                    <span class="suggestion-label d-none status-badge status-warn" style="margin-left: auto;">Recommended</span>
                </label>
            {#else}
                <div class="list-item text-muted small">No payloads available.</div>
            {/for}
        </div>
    </section>

    <div style="margin-top: 2rem;">
        <button type="submit" class="btn btn-primary">Save Test</button>
    </div>
</form>

<script>
    window.agents = [
        {#for agent in agents}
        {
            id: "{agent.id}",
            displayName: "{agent.displayName}",
            supportedTypes: [
                {#for st in agent.supportedTypes}
                {
                    testType: "{st.testType}",
                    required: [{#for r in st.requiredPayloadTypes}"{r}"{#if r_hasNext},{/if}{/for}],
                    optional: [{#for o in st.optionalPayloadTypes}"{o}"{#if o_hasNext},{/if}{/for}]
                }{#if st_hasNext},{/if}
                {/for}
            ]
        }{#if agent_hasNext},{/if}
        {/for}
    ];
</script>
<script src="/js/tests_edit.js"></script>
{/body}
{/include}
