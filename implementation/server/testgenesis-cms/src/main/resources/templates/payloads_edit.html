{#include base.html}
{#title}Edit Payload - TestGenesis{/title}

{#body}
<section>
    <header style="border:none; margin:0; padding:0;">
        <h2>{#if payload.id}Edit{:else}New{/if} Payload</h2>
        <a href="/payloads" class="btn">Back</a>
    </header>
</section>

<form action="/payloads/save" method="POST" enctype="multipart/form-data">
    {#if payload.id}<input type="hidden" name="id" value="{payload.id}">{/if}
    
    <section>
        <p>
            <label>Name</label><br>
            <input type="text" name="name" value="{payload.name}" required placeholder="Payload Name">
        </p>
        <p>
            <label>Description</label><br>
            <textarea name="description" placeholder="Metadata description...">{payload.description}</textarea>
        </p>
        <p>
            <label>Type</label><br>
            <input type="text" name="type" value="{payload.type}" list="payload-types" required placeholder="e.g. selenium-script">
            <datalist id="payload-types">
                {#for type in availableTypes}
                    <option value="{type}"></option>
                {/for}
            </datalist>
        </p>
        <p>
            <label>Metadata (JSON)</label><br>
            <textarea name="metadata" style="font-family:monospace; font-size:0.85rem;" rows="5">{payload.metadata}</textarea>
        </p>
    </section>

    <section>
        <h3>Attachment</h3>
        {#if payload.attachmentName}
            <p class="muted small">Current: <strong>{payload.attachmentName}</strong></p>
        {/if}
        <input type="file" name="attachmentFile">
    </section>

    <button type="submit" class="btn">Save Payload</button>
</form>
{/body}
{/include}
