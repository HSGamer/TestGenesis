{#include base.html}
{#title}New Translation{/title}

{#body}
<div class="flex-between" style="margin-bottom: 2rem;">
    <h2>New Task</h2>
    <a href="/translations" class="btn">Cancel</a>
</div>

<form action="/translations/start" method="POST">
    <div class="card">
        <label>Agent</label>
        <select id="agent-select" name="agentId" required>
            <option value="">-- Select Agent --</option>
            {#for agent in agents}
                <option value="{agent.id}">{agent.displayName}</option>
            {#else}
                <option disabled>No agents available</option>
            {/for}
        </select>
    </div>

    <div class="card">
        <label>Translation Type</label>
        <select id="type-select" name="type" required disabled>
            <option value="">-- Select Agent First --</option>
        </select>
        <div id="type-info" class="status-badge status-warn d-none" style="margin-top: 0.5rem;"></div>
    </div>

    <section>
        <h3>Source Payloads</h3>
        <div id="payload-list" class="list" style="max-height: 400px; overflow-y: auto;">
            {#for p in allPayloads}
                <label class="list-item flex" data-type="{p.type}" style="cursor: pointer;">
                    <input type="checkbox" name="payloadIds" value="{p.id}" style="width: auto;">
                    <span class="small">
                        <strong>{p.name}</strong> 
                        <code class="text-muted">({p.type})</code>
                    </span>
                </label>
            {#else}
                <div class="list-item text-muted small">No payloads found.</div>
            {/for}
        </div>
    </section>

    <div style="margin-top: 2rem;">
        <button type="submit" id="start-btn" class="btn btn-primary" disabled>Start Task</button>
    </div>
</form>

<script>
    window.agents = [
        {#for agent in agents}
        {
            id: "{agent.id}",
            displayName: "{agent.displayName}",
            supportedTranslations: [
                {#for st in agent.supportedTranslations}
                {
                    type: "{st.type}",
                    sources: [{#for stp in st.sourcePayloadTypes}"{stp}"{#if stp_hasNext},{/if}{/for}],
                    targets: [{#for ttp in st.targetPayloadTypes}"{ttp}"{#if ttp_hasNext},{/if}{/for}]
                }{#if st_hasNext},{/if}
                {/for}
            ]
        }{#if agent_hasNext},{/if}
        {/for}
    ];
</script>
<script src="/js/translations_new.js"></script>
{/body}
{/include}
