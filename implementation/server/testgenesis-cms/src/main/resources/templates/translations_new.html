{#include base.html}
{#title}New Task{/title}

{#body}
<section>
    <h2>New Task</h2>
    <nav class="actions">
        <a href="/translations" class="btn">Cancel</a>
    </nav>
</section>

<form action="/translations/start" method="POST">
    <fieldset>
        <legend>Configuration</legend>
        <label for="agent-select">Agent</label>
        <select id="agent-select" name="agentId" required autofocus>
            <option value="">-- Select Agent --</option>
            {#for agent in agents}
                <option value="{agent.id}">{agent.displayName}</option>
            {#else}
                <option disabled>No agents available</option>
            {/for}
        </select>

        <label for="type-select">Translation Type</label>
        <select id="type-select" name="type" required disabled>
            <option value="">-- Select Agent First --</option>
        </select>
        <strong id="type-info" class="status-badge status-warn d-none"></strong>
    </fieldset>

    <template id="option-template">
        <option value=""></option>
    </template>

    <section>
        <h3>Source Payloads</h3>
        <ul id="payload-list" style="max-height: 400px; overflow-y: auto;">
            {#for p in allPayloads}
                <li data-type="{p.type}">
                    <label style="cursor: pointer; width: 100%; display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" name="payloadIds" value="{p.id}" style="width: auto; margin: 0;">
                        <strong>{p.name}</strong> 
                        <code class="text-muted small">({p.type})</code>
                    </label>
                </li>
            {#else}
                <li><p class="text-muted">No payloads found.</p></li>
            {/for}
        </ul>
    </section>

    <button type="submit" id="start-btn" disabled>Start Task</button>
</form>

<script>
    window.agents = [
        {#for agent in agents}
        {
            id: "{agent.id}",
            displayName: "{agent.displayName}",
            supportedTranslations: [
                {#for st in agent.supportedTranslations}
                {
                    type: "{st.type}",
                    sources: [{#for stp in st.sourcePayloadTypes}"{stp}"{#if stp_hasNext},{/if}{/for}],
                    targets: [{#for ttp in st.targetPayloadTypes}"{ttp}"{#if ttp_hasNext},{/if}{/for}]
                }{#if st_hasNext},{/if}
                {/for}
            ]
        }{#if agent_hasNext},{/if}
        {/for}
    ];
</script>
<script src="/js/translations_new.js"></script>
{/body}
{/include}
