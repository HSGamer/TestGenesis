{#include base.html}
{#title}New Translation{/title}

{#body}
<header class="mb-2">
    <h2>Start New Translation</h2>
</header>

<form action="/translations/start" method="POST">
    <div class="form-group">
        <label>Translation Agent</label>
        <select id="agent-select" name="agentId" required>
            <option value="">-- Select Agent --</option>
            {#for agent in agents}
                <option value="{agent.id}">{agent.displayName}</option>
            {#else}
                <option disabled>No agents available</option>
            {/for}
        </select>
    </div>

    <div class="form-group">
        <label>Translation Type</label>
        <select id="type-select" name="type" required disabled>
            <option value="">-- Select Agent First --</option>
        </select>
        <div id="type-info" class="status-badge status-warn mt-1 d-none"></div>
    </div>

    <div class="form-group">
        <label>Source Payloads</label>
        <div id="payload-list" class="list-group mt-1" style="max-height: 400px; overflow-y: auto;">
            {#for p in allPayloads}
                <label class="list-item d-flex gap-1 align-items-center" data-type="{p.type}" style="cursor: pointer;">
                    <input type="checkbox" name="payloadIds" value="{p.id}" style="width: auto;">
                    <span>
                        <strong>{p.name}</strong> 
                        <code class="text-muted small-text">({p.type})</code>
                    </span>
                </label>
            {#else}
                <p class="p-1 text-muted">No payloads available. <a href="/payloads/new">Create one first</a>.</p>
            {/for}
        </div>
    </div>

    <div class="mt-2 d-flex gap-1">
        <button type="submit" id="start-btn" class="btn btn-primary" disabled>Start Translation</button>
        <a href="/translations" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<script>
    window.agents = [
        {#for agent in agents}
        {
            id: "{agent.id}",
            displayName: "{agent.displayName}",
            supportedTranslations: [
                {#for st in agent.supportedTranslations}
                {
                    type: "{st.type}",
                    sources: [{#for stp in st.sourcePayloadTypes}"{stp}"{#if stp_hasNext},{/if}{/for}],
                    targets: [{#for ttp in st.targetPayloadTypes}"{ttp}"{#if ttp_hasNext},{/if}{/for}]
                }{#if st_hasNext},{/if}
                {/for}
            ]
        }{#if agent_hasNext},{/if}
        {/for}
    ];
</script>
<script src="/js/translations_new.js"></script>
{/body}
{/include}
