{#include base.html}
{#title}Save Payload - TestGenesis{/title}

{#body}
<section class="clearfix">
    <div class="title-area">
        <h2>Save Translated Payload</h2>
    </div>
    <div class="action-area">
        <a href="/translations/{sessionId}/status" class="btn">Cancel</a>
    </div>
</section>

<form action="/translations/save-payload" method="POST">
    <input type="hidden" name="sessionId" value="{sessionId}">
    <input type="hidden" name="index" value="{index}">

    <section>
        <h3>Repository Entity</h3>
        <p>
            <label>Entity Name</label><br>
            <input type="text" name="name" value="{defaultName}" required autofocus>
        </p>
        <p>
            <label>Description</label><br>
            <textarea name="description" rows="3">Translated {type} from session {sessionId}</textarea>
        </p>
    </section>

    <section>
        <h3>Metadata</h3>
        <p>
            <label>Payload Type</label><br>
            <input type="text" value="{type}" readonly style="border-color: transparent; padding-left: 0;">
        </p>
    </section>

    <button type="submit" class="btn btn-primary">Save to Database</button>
</form>
{/body}
{/include}
