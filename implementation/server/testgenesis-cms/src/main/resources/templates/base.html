<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{#insert title}TestGenesis CMS{/insert}</title>
    <link rel="stylesheet" href="/style.css">
    {#insert head}{/insert}
</head>
<body>
    <aside>
        <nav>
            <ul>
                <li><a href="/">Dashboard</a></li>
                <li><a href="/payloads">Payloads</a></li>
                <li><a href="/tests">Tests</a></li>
                <li><a href="/translations">Translations</a></li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <h1>{#insert title}Dashboard{/insert}</h1>
        </header>

        <section class="container">
            {#insert body}{/insert}
        </section>

        <footer>
            <p>&copy; 2026 TestGenesis - Universal Agent Protocol CMS</p>
        </footer>
    </main>

    <script>
        // Set active nav link based on current path
        document.querySelectorAll('aside nav a').forEach(link => {
            if (window.location.pathname === link.getAttribute('href') || (link.getAttribute('href') !== '/' && window.location.pathname.startsWith(link.getAttribute('href')))) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
