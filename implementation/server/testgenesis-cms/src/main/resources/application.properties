# Spring Boot Application Properties
spring.application.name=testgenesis-cms
server.port=8080
server.http2.enabled=true
# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# JPA
spring.datasource.url=jdbc:h2:mem:testgenesis;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Mustache
spring.mustache.suffix=.mustache
spring.mustache.prefix=classpath:/templates/
# gRPC Servlet Multiplexing
spring.grpc.server.servlet.enabled=true
# Since we are using the Servlet implementation, it will share the server port (8080)
# Observability (Actuator)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
