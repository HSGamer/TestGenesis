version: v2
plugins:
  # Base ES/TypeScript message and enum generation
  - local: protoc-gen-es
    out: src/generated
    opt:
      - target=ts
      - import_extension=.js

  # ConnectRPC service generation
  - local: protoc-gen-connect-es
    out: src/generated
    opt:
      - target=ts
      - import_extension=.js
